name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install .
          pip install pytest pytest-cov
      - name: Run unit tests
        run: |
          pytest tests/unit/test_losses.py tests/unit/test_temporal_encoder.py \
                 tests/unit/test_spatial_encoder.py tests/unit/test_metric_head.py \
                 tests/unit/test_monitor.py -q
