version: "3.9"
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: deepfake-detector:1.0.0
    command: uvicorn deepfake_detector.api.main:app --host 0.0.0.0 --port 8080
    ports: ["8080:8080"]
    depends_on: [redis]
    environment:
      - CELERY_BROKER=redis://redis:6379/0
    volumes:
      - ../checkpoints:/app/checkpoints:ro
      - ../configs:/app/configs:ro

  worker:
    image: deepfake-detector:1.0.0
    command: celery -A deepfake_detector.api.tasks worker --loglevel=info
    depends_on: [redis]
    environment:
      - CELERY_BROKER=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
