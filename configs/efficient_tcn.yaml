model:
  embed_dim: 512
  n_layers: 6
  kernel: 3
  dropout: 0.1
  freeze_base: true
  arc_s: 32.0
  arc_m: 0.5
preprocessing:
  target_frames: 16
  max_side: 640
  face_min_conf: 0.92
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
training:
  batch: 2
  grad_accum: 32
  lr: 1.0e-4
  wd: 1.0e-4
  epochs: 30
  lam_arc: 1.0
  lam_tc: 0.3
  lam_short: 0.1
  mixed: true
  num_workers: 2
  seed: 42
inference:
  device: "cpu"
  jit: true
  dtype: "bfloat16"
  gradcam: false
  threshold: 0.5
