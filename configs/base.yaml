model:
  embed_dim: 512
  n_layers: 2
  kernel: 3
  dropout: 0.3
  freeze_base: false
preprocessing:
  target_frames: 16
  max_side: 640
  face_min_conf: 0.92
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
training:
  batch: 4
  grad_accum: 16
  lr: 3.0e-4
  wd: 1.0e-4
  epochs: 60
  lam_arc: 1.0
  lam_tc: 0.2
  lam_short: 0.1
  mixed: true
  num_workers: 2
  seed: 42
inference:
  device: "cpu"
  checkpoint_path: "checkpoints/best_model.pt"
  jit: true
  dtype: "bfloat16"
  gradcam: true
  threshold: 0.5
api:
  host: "0.0.0.0"
  port: 8080
  max_upload_mb: 200
  celery_broker: "redis://localhost:6379/0"
logging:
  level: "INFO"
  tensorboard_dir: "runs"
